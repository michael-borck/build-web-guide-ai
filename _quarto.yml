project:
  type: book
  output-dir: _book

book:
  title: "Build Web, Guide AI"
  subtitle: "Business Web Development with AI"
  author: "Michael Borck"
  date: today
  license: "CC BY 4.0 (content), MIT (code examples)"
  description: "A practical approach to web development that embraces AI as your development partner while building real business solutions with HTML, CSS, JavaScript, WordPress, and React."
  cover-image: cover.png
  favicon: favicon.svg
  site-url: https://michael-borck.github.io/build-web-guide-ai
  repo-url: https://github.com/michael-borck/build-web-guide-ai
  repo-branch: main
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - copyright.qmd
    - reading-list.qmd
    - acknowledgments.qmd
    - part: "Part 0: Your AI Development Partnership"
      chapters:
        - chapter-ai-web-partner.qmd
    - part: "Part I: Web Foundations"
      chapters:
        - chapter-structure.qmd
        - chapter-presentation.qmd
        - chapter-behaviour.qmd
        - chapter-connection.qmd
        - projects/project-portfolio.qmd
    - part: "Part II: Content Management for Business"
      chapters:
        - chapter-why-cms.qmd
        - chapter-wordpress-platform.qmd
        - chapter-extending-platforms.qmd
        - chapter-headless-architecture.qmd
        - projects/project-business-site.qmd
    - part: "Part III: Modern Frontend Development"
      chapters:
        - chapter-component-thinking.qmd
        - chapter-rapid-development.qmd
        - chapter-professional-practices.qmd
        - projects/project-react-integration.qmd
    - part: "Part IV: The Professional Developer"
      chapters:
        - chapter-emerging-technologies.qmd
        - chapter-development-career.qmd
        - chapter-ai-era-developer.qmd
    - references.qmd
    - about-author.qmd
  page-navigation: true
  sidebar:
    style: docked
    search: true
    collapse-level: 2
    tools:
      - icon: github
        href: https://github.com/michael-borck/build-web-guide-ai
  other-links:
    - text: Download PDF
      icon: file-pdf
      href: build-web-guide-ai.pdf
    - text: Download EPUB
      icon: book
      href: build-web-guide-ai.epub
    - text: Download llm.txt
      icon: robot
      href: llm.txt
    - text: DeepWiki
      icon: search
      href: https://deepwiki.com/michael-borck/build-web-guide-ai

bibliography: references.bib

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: assets/custom.css
    include-after-body: chatbot.html
    code-fold: false
    code-tools: true
    code-copy: hover
    code-overflow: wrap
    toc: true
    toc-depth: 3
    toc-expand: 2
    number-sections: true
    number-depth: 2
    highlight-style: github

crossref:
  chapters: true
  fig-title: "Figure"
  tbl-title: "Table"

execute:
  echo: true
  warning: false
  error: false
