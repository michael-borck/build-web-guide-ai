project:
  type: book
  output-dir: _book
  resources:
    - tools/**

book:
  title: "Build Web, Guide AI"
  subtitle: "Business Web Development with AI"
  author: "Michael Borck"
  date: "last-modified"
  license: "CC BY 4.0 (content), MIT (code examples)"
  description: "A practical approach to web development that embraces AI as your development partner while building real business solutions with HTML, CSS, JavaScript, WordPress, and React."
  favicon: favicon.svg
  site-url: https://michael-borck.github.io/build-web-guide-ai
  repo-url: https://github.com/michael-borck/build-web-guide-ai
  repo-branch: main
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - copyright.qmd
    - chapters/reading-list.qmd
    - acknowledgments.qmd
    - part: "Part 0: Your AI Development Partnership"
      chapters:
        - chapters/chapter-ai-web-partner.qmd
    - part: "Part I: Web Foundations"
      chapters:
        - chapters/chapter-structure.qmd
        - chapters/chapter-presentation.qmd
        - chapters/chapter-behaviour.qmd
        - chapters/chapter-connection.qmd
        - projects/project-portfolio.qmd
    - part: "Part II: Content Management for Business"
      chapters:
        - chapters/chapter-why-cms.qmd
        - chapters/chapter-wordpress-platform.qmd
        - chapters/chapter-extending-platforms.qmd
        - chapters/chapter-headless-architecture.qmd
        - projects/project-business-site.qmd
    - part: "Part III: Modern Frontend Development"
      chapters:
        - chapters/chapter-component-thinking.qmd
        - chapters/chapter-rapid-development.qmd
        - chapters/chapter-professional-practices.qmd
        - projects/project-react-integration.qmd
    - part: "Part IV: The Professional Developer"
      chapters:
        - chapters/chapter-emerging-technologies.qmd
        - chapters/chapter-development-career.qmd
        - chapters/chapter-ai-era-developer.qmd
    - references.qmd
    - about-author.qmd
  page-navigation: true
  sidebar:
    style: docked
    search: true
    collapse-level: 2
    tools:
      - icon: github
        href: https://github.com/michael-borck/build-web-guide-ai
  other-links:
    - text: Download PDF
      icon: file-pdf
      href: build-web-guide-ai.pdf
    - text: Download EPUB
      icon: book
      href: build-web-guide-ai.epub
    - text: Download llm.txt
      icon: robot
      href: llm.txt
    - text: GitHub
      icon: github
      href: https://github.com/michael-borck/build-web-guide-ai
    - text: DeepWiki
      icon: search
      href: https://deepwiki.com/michael-borck/build-web-guide-ai
    - text: All Books
      icon: collection
      href: https://books.borck.education

bibliography: references.bib

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: assets/custom.css
    cover-image: cover.png
    include-after-body: chatbot.html
    code-fold: false
    code-tools: true
    code-copy: hover
    code-overflow: wrap
    toc: true
    toc-depth: 3
    toc-expand: 2
    number-sections: true
    number-depth: 2
    highlight-style: github
  pdf:
    documentclass: book
    toc: true
    toc-depth: 1
    number-sections: true
    hyperrefoptions: draft
    geometry:
      - paperwidth=7in
      - paperheight=10in
      - inner=1in
      - outer=0.75in
      - top=0.75in
      - bottom=0.75in
    include-in-header: pdf-header.tex
    include-before-body:
      - copyright-page.tex
  epub:
    toc: true
    toc-depth: 1
    css: epub-styles.css

crossref:
  chapters: true
  fig-title: "Figure"
  tbl-title: "Table"

execute:
  echo: true
  warning: false
  error: false
